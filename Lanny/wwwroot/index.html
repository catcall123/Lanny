<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanny — Network Device Discovery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🔍 Lanny</h1>
            <p class="subtitle">Network Device Discovery Agent</p>
        </div>
        <div class="status-bar">
            <span id="connectionStatus" class="status-badge disconnected">Disconnected</span>
            <span id="deviceCount" class="device-count">0 devices</span>
            <span id="lastScan" class="last-scan"></span>
        </div>
    </header>

    <main>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search by IP, MAC, hostname, vendor..." />
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="online">Online</button>
                <button class="filter-btn" data-filter="offline">Offline</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalDevices">0</div>
                <div class="stat-label">Total Devices</div>
            </div>
            <div class="stat-card online">
                <div class="stat-value" id="onlineDevices">0</div>
                <div class="stat-label">Online</div>
            </div>
            <div class="stat-card offline">
                <div class="stat-value" id="offlineDevices">0</div>
                <div class="stat-label">Offline</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="vendorCount">0</div>
                <div class="stat-label">Vendors</div>
            </div>
        </div>

        <div class="table-container">
            <table id="deviceTable">
                <thead>
                    <tr>
                        <th class="sortable status-column" data-sort="isOnline">Status</th>
                        <th class="sortable ip-column" data-sort="ipAddress">IP Address</th>
                        <th class="sortable mac-column" data-sort="macAddress">MAC Address</th>
                        <th class="sortable hostname-column" data-sort="hostname">Hostname</th>
                        <th class="sortable vendor-column" data-sort="vendor">Vendor</th>
                        <th class="sortable discovery-column" data-sort="discoveryMethod">Discovery</th>
                        <th class="sortable date-column first-seen-column" data-sort="firstSeen">First Seen</th>
                        <th class="sortable date-column last-seen-column" data-sort="lastSeen">Last Seen</th>
                    </tr>
                </thead>
                <tbody id="deviceTableBody">
                    <tr class="empty-row">
                        <td colspan="8">Waiting for scan data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Device detail modal -->
    <div id="deviceModal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <h2 id="modalTitle">Device Details</h2>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
