# Lanny container — needs host network + capabilities for ARP/ICMP
# podman build -t lanny .
# podman run -d --name lanny --network=host --cap-add=NET_RAW --cap-add=NET_ADMIN -v lanny-data:/app/data lanny

services:
  lanny:
    build: ./Lanny
    container_name: lanny
    init: true
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - lanny-data:/app/data
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Data Source=/app/data/lanny.db
      - ScanSettings__Subnet=auto
      - ScanSettings__EnablePassiveArpListener=true
      - ScanSettings__EnableSsdpListener=true
      - ScanSettings__PassiveCaptureInterface=any
      - ScanSettings__PassiveObservationRetentionMinutes=5
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  lanny-data:
